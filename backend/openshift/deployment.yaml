---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fspts-backend
  namespace: ${OC_NAMESPACE}
  labels:
    app: fspts-backend
spec:
  replicas: ${MIN_REPLICAS}
  selector:
    matchLabels:
      app: fspts-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: fspts-backend
      annotations:
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: '8080'
        prometheus.io/scrape: 'true'
    spec:
      # The Spring Boot app talks to Oracle, Cognito, and the IDIR lookup
      # service — never the Kubernetes API. Suppress the auto-mounted
      # default service-account token to close the SonarCloud "Service
      # account permissions should be restricted" finding.
      automountServiceAccountToken: false
      # Pod-level security defaults. fsGroup and seccompProfile are
      # intentionally omitted: OpenShift's restricted-v2 SCC enforces a
      # MustRunAs fsGroup from the namespace's allocated GID range (setting
      # one ourselves is rejected), and Silver translates seccompProfile
      # into a deprecated alpha annotation that the SCC forbids. The SCC
      # still injects fsGroup and enforces runtime/default seccomp at the
      # SCC layer — we just can't declare them in the pod spec.
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: fspts-backend-init
          image: ghcr.io/bcgov/nr-forest-client/common:prod
          imagePullPolicy: Always
          env:
            - name: ORACLEDB_HOST
              value: ${DATABASE_HOST}
            - name: ORACLEDB_SECRET
              valueFrom:
                secretKeyRef:
                  name: fspts-backend-secret
                  key: KEYSTORE_SECRET
            - name: ORACLEDB_PORT
              value: "1543"
          volumeMounts:
            - name: fspts-backend-api-cert
              mountPath: /cert
            # keytool/openssl write intermediate files when assembling the
            # Oracle TLS keystore; needed once readOnlyRootFilesystem=true.
            # Distinct from the main container's tmp-storage so init's
            # scratch material doesn't leak across.
            - name: init-tmp-storage
              mountPath: /tmp
          resources:
            requests:
              cpu: 200m
              memory: 300Mi
              ephemeral-storage: "50Mi"
            limits:
              cpu: 500m
              memory: 500Mi
              ephemeral-storage: "100Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: fspts-backend
          image: ${BACKEND_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # ── Spring profile + server ───────────────────────
            - name: SPRING_PROFILES_ACTIVE
              value: oracle
            - name: SERVER_PORT
              value: "8080"

            # ── Cognito / OAuth2 resource server ──────────────
            - name: AWS_COGNITO_ISSUER_URI
              value: ${AWS_COGNITO_ISSUER_URI}
            - name: COGNITO_USERINFO_URI
              value: ${COGNITO_USERINFO_URI}

            # ── Identity-lookup (IDIR user search) ────────────
            - name: IDENTITY_LOOKUP_BASE_URL
              value: ${IDENTITY_LOOKUP_BASE_URL}

            # ── Oracle DB (consumed by application.properties) ─
            - name: DATABASE_HOST
              value: ${DATABASE_HOST}
            - name: DATABASE_SERVICE_NAME
              value: ${DATABASE_SERVICE_NAME}
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: fspts-backend-secret
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fspts-backend-secret
                  key: DATABASE_PASSWORD

            # ── Logging ───────────────────────────────────────
            - name: APP_LOG_LEVEL
              value: ${APP_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
              value: ${SPRING_SECURITY_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB
              value: ${SPRING_WEB_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_AUTOCONFIGURE
              value: ${SPRING_BOOT_AUTOCONFIG_LOG_LEVEL}
            - name: SPRING_JPA_SHOW_SQL
              value: "${SPRING_JPA_SHOW_SQL}"

            # ── Keystore (for Oracle TLS cert mounted at /cert) ─
            - name: KEYSTORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: fspts-backend-secret
                  key: KEYSTORE_SECRET
          resources:
            requests:
              cpu: ${MIN_CPU}
              memory: ${MIN_MEM}
              # /tmp scratch (JVM, Tomcat work dir, JasperReports compile
              # cache, JDBC driver temps) + /logs + /temp emptyDir mounts.
              ephemeral-storage: "200Mi"
            limits:
              # JVM args set -Xmx200m -XX:MaxMetaspaceSize=200m; 800Mi leaves
              # generous headroom for native + Direct + Netty buffers.
              cpu: "1000m"
              memory: "800Mi"
              ephemeral-storage: "500Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
            successThreshold: 1
          volumeMounts:
            - name: fspts-backend-api-cert
              mountPath: /cert
            - name: tls-certs
              mountPath: "/etc/tls-certs"
              readOnly: true
            - name: log-storage
              mountPath: /logs
            - name: app-storage
              mountPath: /temp
            # JVM scratch space — Tomcat work dir, JasperReports compile
            # cache, JDBC driver temps. Required once the container's root
            # filesystem goes read-only.
            - name: tmp-storage
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tls-certs
          secret:
            secretName: fspts-backend-cert
        - name: log-storage
          emptyDir: {}
        - name: app-storage
          emptyDir: {}
        - name: tmp-storage
          emptyDir: {}
        - name: init-tmp-storage
          emptyDir: {}
        - name: fspts-backend-api-cert
          persistentVolumeClaim:
            claimName: fspts-backend-api-cert
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: fspts-backend
  namespace: ${OC_NAMESPACE}
  labels:
    app: fspts-backend
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: fspts-backend-cert
spec:
  selector:
    app: fspts-backend
  ports:
    - name: 8080-tcp
      port: 8080
      protocol: TCP
---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fspts-backend-cpu-autoscaler
  namespace: ${OC_NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fspts-backend
  minReplicas: ${MIN_REPLICAS}
  maxReplicas: ${MAX_REPLICAS}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 200
---
# PVC for Keystore
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  labels:
    app: fspts-backend
  name: fspts-backend-api-cert
  namespace: ${OC_NAMESPACE}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Mi
  storageClassName: netapp-file-standard
---
# Secrets — all credentials live here, referenced via secretKeyRef above
apiVersion: v1
kind: Secret
metadata:
  name: fspts-backend-secret
  namespace: ${OC_NAMESPACE}
  labels:
    app: fspts-backend
type: Opaque
stringData:
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  KEYSTORE_SECRET: ${KEYSTORE_SECRET}
---
# NetworkPolicy: allow ingress into backend from
#   1) frontend pods (so Caddy's `reverse_proxy /api*` can reach :8080)
#   2) cluster monitoring (so Prometheus can scrape /actuator/prometheus)
# Without this, silver's default-deny ingress drops Caddy's outbound to
# fspts-backend:8080 and the user sees 502 Bad Gateway on /api/* calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-frontend-and-monitoring-to-backend
  namespace: ${OC_NAMESPACE}
spec:
  podSelector:
    matchLabels:
      app: fspts-backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fspts-frontend
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
  policyTypes:
    - Ingress
