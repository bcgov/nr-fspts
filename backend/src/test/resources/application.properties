spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
logging.level.ca.bc.gov.nrs.fsp.api=DEBUG
spring.main.allow-bean-definition-overriding=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://bc.ca
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://bc.ca/.well-known/jwks.json
# EmailEventDispatcher needs a JavaMailSender. Setting any host triggers
# MailSenderAutoConfiguration to register the bean; nothing actually
# sends because the @TransactionalEventListener fires AFTER_COMMIT and
# tests don't drive that path.
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
