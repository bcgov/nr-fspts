spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
logging.level.ca.bc.gov.nrs.fsp.api=DEBUG
spring.main.allow-bean-definition-overriding=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://bc.ca
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://bc.ca/.well-known/jwks.json
