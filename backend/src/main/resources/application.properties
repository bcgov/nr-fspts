# Logging — env vars map directly to Spring's relaxed-binding form
# (LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY etc.) so we don't need
# explicit ${VAR} bindings here. Set via the OpenShift deployment env.
logging.level.ca.bc.gov.nrs.fsp.api=${APP_LOG_LEVEL:INFO}

# DB — JDBC URL is composed from DATABASE_HOST + DATABASE_SERVICE_NAME
# (matching nr-rept's application-oracle.yml). TCPS = TLS-wrapped Oracle
# net protocol; port defaults to 1543 (NRS TLS listener) but is
# overridable via DATABASE_PORT for non-prod targets.
spring.datasource.url=jdbc:oracle:thin:@(DESCRIPTION=(ADDRESS=(PROTOCOL=TCPS)(HOST=${DATABASE_HOST})(PORT=${DATABASE_PORT:1543}))(CONNECT_DATA=(SERVICE_NAME=${DATABASE_SERVICE_NAME})(SERVER=DEDICATED)))
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# Oracle TLS trust — keystore assembled by the init container, mounted
# at /cert. Password comes from the fsp-backend-secret KEYSTORE_SECRET.
spring.datasource.hikari.data-source-properties.javax.net.ssl.trustStoreType=JKS
spring.datasource.hikari.data-source-properties.javax.net.ssl.trustStore=/cert/jssecacerts
spring.datasource.hikari.data-source-properties.javax.net.ssl.trustStorePassword=${KEYSTORE_SECRET}
spring.datasource.hikari.max-lifetime=120000

# Cognito JWT resource-server config — same env-var names as nr-rept.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AWS_COGNITO_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AWS_COGNITO_ISSUER_URI}/.well-known/jwks.json

# FAM identity-lookup API — IDIR directory used by the UserSearchModal
# and to enrich district-notification designate rows with display name
# + email. Empty base-url is tolerated (UserDirectoryService still
# builds, calls just fail). Set via the OpenShift IDENTITY_LOOKUP_BASE_URL
# env var.
ca.bc.gov.nrs.identity-lookup.base-url=${IDENTITY_LOOKUP_BASE_URL:}

spring.jackson.deserialization.fail-on-unknown-properties=true
management.endpoint.metrics.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
spring.jmx.enabled=false
logging.file.name=/logs/app.log
logging.logback.rollingpolicy.max-file-size=5MB
# Multipart limits for FSP XML submissions. The Mackenzie sample
# fixture is ~9.5MB (mostly polygon coordinates); attachments can be similar.
# Defaults (1MB per file / 10MB per request) silently hang the connection
# instead of returning a useful 413, so set explicit headroom.
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB
# Force '.' as decimal separator on every pooled connection. Without
# this, an Oracle session whose default NLS_NUMERIC_CHARACTERS uses
# ',' as the decimal mark fails to TO_NUMBER strings like '2.5' that
# the FSP submission write path passes (e.g. MIN_HORIZONTAL_DISTANCE).
spring.datasource.hikari.connection-init-sql=ALTER SESSION SET NLS_NUMERIC_CHARACTERS = '.,'
# FEATURE_CLASS_SKEY constants for FDU + Identified Area geometry inserts.
# The submission write path queries FEATURE_CLASSES at runtime to find
# the right skey by NAME, but the legacy DB user role
# (PROXY_FSA_FSP_READ_WRITE_USER) lacks SELECT on that table on some
# deployments. Setting these here bypasses the lookup entirely.
# Find the values via:
#   SELECT DISTINCT feature_class_skey FROM forest_development_unit_geom;
#   SELECT DISTINCT feature_class_skey FROM fsp_identified_area_geometry;
# Leave commented to fall back to the runtime lookup.
#fsp.feature-class.forest-development-unit-skey=
#fsp.feature-class.identified-area-skey=
# Undertow enforces its own connector-level body cap independent of
# spring.servlet.multipart.*. Default is unlimited (-1) but explicit
# is safer — match the multipart cap so a request can't slip past
# Spring's resolver and hit Undertow's default later.
server.undertow.max-http-post-size=524288000
# Tomcat equivalent in case the deployment swaps web server.
server.tomcat.max-http-form-post-size=524288000
server.tomcat.max-swallow-size=524288000
logging.logback.rollingpolicy.clean-history-on-start=true
logging.logback.rollingpolicy.max-history=1
logging.pattern.file={"time_stamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%3p" ,"thread":"%t" ,"class":"%logger{36}","msg":"%replace(%msg){'[\n\r\"]',''}", "exception":"%replace(%rEx{10}){'[\n\r\"]',''}","http_event":%X{httpEvent:-""}}%nopex%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} | [%5p] | [%t] | [%logger{36}] | [%replace(%msg){'[\n\r\"]',''} %X{httpEvent}] | %replace(%rEx{10}){'[\n\r\"]',''}%nopex%n
initialization.background.enabled=true
