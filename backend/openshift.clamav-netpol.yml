---
# ClamAV ingress NetworkPolicy — applied INTO the shared tools namespace.
#
# The backend reaches clamd cross-namespace at
# clamav.<tools-ns>.svc.cluster.local:3310. The backend's own namespace
# doesn't restrict egress, so the block is on the receiving side: the
# clamav pod in the tools namespace only accepts traffic that an ingress
# policy allows. This template creates one allow rule per calling
# environment (dev / test / prod), each permitting that app namespace to
# open TCP 3310 to the clamav pods.
#
# Applied separately from the app Deployment because it targets a
# DIFFERENT namespace (tools), which needs its own token — see the
# "Allow backend → clamav" step in reusable-deploy.yml.
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: nr-fspts-clamav-netpol
parameters:
  - name: TOOLS_NAMESPACE
    description: Namespace where the shared clamav clamd runs (the tools namespace).
    required: true
  - name: SOURCE_NAMESPACE
    description: App namespace being allowed to reach clamav (this deploy's namespace).
    required: true
  - name: CLAMAV_POD_APP
    description: Value of the label that selects the clamav pods in tools.
    value: clamav
  - name: CLAMAV_POD_LABEL_KEY
    description: Label KEY the clamav pods are selected by (usually 'app').
    value: app
  - name: CLAMAV_PORT
    value: "3310"
objects:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      # One policy per source namespace, so each environment's deploy owns
      # (and overwrites) only its own rule.
      name: allow-${SOURCE_NAMESPACE}-to-clamav
      namespace: ${TOOLS_NAMESPACE}
      labels:
        app.kubernetes.io/managed-by: nr-fspts
        app.kubernetes.io/part-of: nr-fspts
    spec:
      podSelector:
        matchLabels:
          ${CLAMAV_POD_LABEL_KEY}: ${CLAMAV_POD_APP}
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ${SOURCE_NAMESPACE}
          ports:
            - protocol: TCP
              # ${{ }} substitutes as a number so the port stays an int.
              port: ${{CLAMAV_PORT}}
      policyTypes:
        - Ingress
