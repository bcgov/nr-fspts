---
# App-namespace EGRESS NetworkPolicy: lets the backend pods reach the shared
# clamav clamd (in the tools namespace) and DNS.
#
# ⚠️ READ BEFORE APPLYING. NetworkPolicy egress is all-or-nothing per pod:
#   • If this namespace has NO egress policy today, egress is already OPEN — you
#     do NOT need this, and applying a *targeted* egress policy would restrict
#     the backend to ONLY what's listed here (breaking Oracle / DNS / SMTP /
#     Cognito / user-lookup). In that case the block is on the clamav (tools)
#     INGRESS side instead — use openshift.clamav-netpol.yml.
#   • If this namespace enforces a default-deny egress (check with
#     `oc get networkpolicy -n <app-namespace>`), THEN apply this. NetworkPolicy
#     allows are additive (a union), so this just adds DNS + clamav on top of
#     whatever the deny-all baseline already permits (e.g. Oracle).
#
# Applied to the APP namespace (this deploy's own namespace), so it uses the
# normal oc_namespace / oc_token — no tools-namespace token needed. Opt-in via
# the CLAMAV_EGRESS_POLICY variable; see reusable-deploy.yml.
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: nr-fspts-clamav-egress-netpol
parameters:
  - name: NAME
    value: nr-fspts
  - name: ZONE
    required: true
  - name: TOOLS_NAMESPACE
    description: Namespace where the shared clamav clamd runs.
    required: true
  - name: CLAMAV_PORT
    value: "3310"
objects:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: ${NAME}-backend-${ZONE}-egress-clamav
      labels:
        app: ${NAME}-backend-${ZONE}
    spec:
      podSelector:
        matchLabels:
          app: ${NAME}-backend-${ZONE}
      egress:
        # DNS — needed to resolve the clamav FQDN (to any resolver).
        - ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
        # clamd in the tools namespace.
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ${TOOLS_NAMESPACE}
          ports:
            - protocol: TCP
              # ${{ }} substitutes as a number so the port stays an int.
              port: ${{CLAMAV_PORT}}
      policyTypes:
        - Egress
