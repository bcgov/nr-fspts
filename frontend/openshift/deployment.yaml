---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fspts-frontend
  namespace: ${OC_NAMESPACE}
  labels:
    app: fspts-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fspts-frontend
  template:
    metadata:
      labels:
        app: fspts-frontend
    spec:
      # Neither Caddy nor the SPA shell needs to reach the Kubernetes API,
      # so suppress the auto-mounted default service-account token. Closes
      # the SonarCloud "Service account permissions should be restricted"
      # finding without having to introduce a custom ServiceAccount + RBAC.
      automountServiceAccountToken: false
      # Pod-level security defaults. OpenShift's restricted-v2 SCC injects an
      # fsGroup from the namespace's pre-allocated GID range when one isn't
      # specified here; the kubelet then chowns the emptyDir mounts below to
      # that GID with setgid + group-write, so the random UID (which is in
      # that group) can write into them. Setting fsGroup explicitly is
      # rejected because the SCC's MustRunAs strategy limits it to the
      # namespace range.
      #
      # seccompProfile is also intentionally omitted: BC Gov Silver
      # translates the field into a deprecated alpha annotation that
      # restricted-v2 forbids. The SCC enforces runtime/default at the SCC
      # level regardless, so we don't lose protection by leaving it out.
      securityContext:
        runAsNonRoot: true
      # Seed the writable /srv emptyDir from the image's static SPA bundle —
      # we need /srv writable because docker-entrypoint.sh generates
      # /srv/config.js at container start from VITE_* env vars (runtime
      # config injection), but the rest of the root filesystem stays
      # read-only (KSV-0014).
      initContainers:
        - name: seed-srv
          image: ${FRONTEND_IMAGE}
          command:
            - sh
            - -c
            - 'cp -r /srv/. /srv-rw/'
          volumeMounts:
            - name: srv
              mountPath: /srv-rw
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
              ephemeral-storage: "100Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: fspts-frontend
          # Updated by the CI pipeline via envsubst
          image: ${FRONTEND_IMAGE}
          ports:
            - name: http
              containerPort: 3000
            - name: health
              containerPort: 3001
          env:
            - name: LOG_LEVEL
              value: ${FRONTEND_LOG_LEVEL}
            - name: BACKEND_URL
              value: ${BACKEND_URL}
            # Redirect Caddy state dirs onto the writable /tmp emptyDir so
            # readOnlyRootFilesystem doesn't break Caddy startup.
            - name: XDG_DATA_HOME
              value: /tmp
            - name: XDG_CONFIG_HOME
              value: /tmp
            # VITE_* values are injected into /srv/config.js by docker-entrypoint.sh
            # at container start, so a single image works for DEV/TEST/PROD.
            - name: VITE_USER_POOLS_ID
              value: ${VITE_USER_POOLS_ID}
            - name: VITE_USER_POOLS_WEB_CLIENT_ID
              value: ${VITE_USER_POOLS_WEB_CLIENT_ID}
            - name: VITE_REDIRECT_SIGN_OUT
              value: ${VITE_REDIRECT_SIGN_OUT}
            - name: VITE_BACKEND_URL
              value: ${VITE_BACKEND_URL}
            - name: VITE_APP_NAME
              value: ${VITE_APP_NAME}
            - name: VITE_ZONE
              value: ${VITE_ZONE}
          volumeMounts:
            - name: srv
              mountPath: /srv
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              # Covers /srv (~5-20 MiB SPA bundle, copied in by initContainer)
              # and /tmp (Caddy state + Coraza scratch).
              ephemeral-storage: "100Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
              ephemeral-storage: "200Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: srv
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: fspts-frontend
  namespace: ${OC_NAMESPACE}
spec:
  selector:
    app: fspts-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
# Route (OpenShift-specific ingress)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: fspts-frontend
  namespace: ${OC_NAMESPACE}
spec:
  host: ${FRONTEND_HOST}
  to:
    kind: Service
    name: fspts-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# NetworkPolicy: allow ingress from the OpenShift router into the frontend pods.
# BC Gov silver namespaces have default-deny ingress; without this the router
# returns 503 even though the Route is Admitted and the Service has endpoints.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress-to-frontend
  namespace: ${OC_NAMESPACE}
spec:
  podSelector:
    matchLabels:
      app: fspts-frontend
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  policyTypes:
    - Ingress
