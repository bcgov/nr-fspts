# Reusable Deploy
#
# Adapted from the BCGov quickstart-openshift template
# (https://github.com/bcgov/quickstart-openshift) to drop the Postgres
# database job — we use an external shared Oracle, not a per-PR DB.
#
# Each service Template (backend/frontend) is `oc process`-ed with parameters
# specific to that service. Splitting into named jobs (rather than a matrix
# with conditional params) keeps the wiring readable.
name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub/OpenShift environment (e.g. dev, test, prod)
        default: ""
        type: string
      target:
        description: Deployment target; usually PR number, 'test' or 'prod'
        default: ${{ github.event.number }}
        type: string
      slot:
        description: |
          Route hostname slot — PR # mod-50'd into a fixed pool of pre-registered
          Cognito callback URIs (see pr-open.yml). Omit for TEST/PROD; defaults to
          `target` in that case so the host stays `nr-fspts-{test,prod}.apps...`.
        default: ""
        type: string
      backend_replicas:
        description: |
          Backend pod count (sets both Deployment.spec.replicas and the
          backend HPA's min/max). Defaults to "1" so PR previews stay light;
          merge.yml sets "2" for TEST and "3" for PROD. lite_mode strips the
          HPA on PR previews regardless.
        default: "1"
        type: string
      frontend_replicas:
        description: |
          Frontend pod count. Defaults to "2" (the original hardcoded value
          before this template was parameterized); merge.yml sets "2" for
          TEST and "3" for PROD. PR previews get 1 via lite_mode.
        default: "2"
        type: string
      tag:
        description: Container tag
        default: ${{ github.event.number }}
        type: string
      triggers:
        description: Triggers for deployment (paths that must change)
        default: ""
        type: string

    secrets:
      oc_namespace:
        description: OpenShift namespace
        required: true
      oc_token:
        description: OpenShift token
        required: true
      database_user:
        description: Oracle DATABASE_USER
        required: true
      database_password:
        description: Oracle DATABASE_PASSWORD
        required: true
      database_host:
        description: Oracle host
        required: true
      database_service_name:
        description: Oracle service name
        required: true
      keystore_secret:
        description: Oracle keystore passphrase
        required: true
      keycloak_sa_client_id:
        description: |
          Keycloak admin service-account client id (needs realm-management
          'manage-clients'). Used to create/sync the FSP backend's user-lookup
          service account. Omit to skip that step (e.g. PR previews).
        required: false
      keycloak_sa_client_secret:
        description: Keycloak admin service-account client secret
        required: false
      keycloak_issuer_uri:
        description: |
          Keycloak realm issuer URI (…/realms/<realm>). Drives the service-account
          script and the backend's user-lookup token URL. Omit to skip both.
        required: false
      user_lookup_base_url:
        description: nr-user-lookup-api base URL for this environment.
        required: false
      oc_namespace_tools:
        description: |
          Namespace of the shared clamav clamd (the tools namespace). Set to
          apply the ingress NetworkPolicy that lets this env's backend reach
          clamav cross-namespace. Omit to skip (e.g. if clamav isn't used).
        required: false
      oc_token_tools:
        description: |
          OpenShift token with edit rights in oc_namespace_tools, used only to
          apply the clamav ingress NetworkPolicy there. Omit to skip.
        required: false
      clamav_host:
        description: |
          clamd host for the backend's CLAMAV_HOST (e.g.
          clamav.<tools-namespace>.svc.cluster.local). Required by the backend
          template — the deploy fails if it isn't provided.
        required: false
      fom_api_url:
        description: |
          nr-fom API base URL for this environment (…/api/external/fom-by-fsp).
          Fills the FSP-300 "Associated FOMs" column. Omit to disable the
          lookup (column stays blank).
        required: false

    outputs:
      triggered:
        description: Has deployment been triggered?
        value: ${{ jobs.frontend.outputs.triggered }}

permissions: {}

jobs:
  backend:
    name: Deploy (backend)
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    # Plumb sensitive values through job-level env vars rather than expanding
    # `${{ secrets.* }}` directly inside the `parameters` string. The deployer
    # action ultimately runs:
    #   TEMPLATE="$(oc process ... ${{ inputs.parameters }} ...)"
    # which means GHA substitutes the literal secret into a bash double-quoted
    # context. Any `$X` inside the value (where X is an unset name) gets
    # variable-expanded by bash and silently dropped along with its leading
    # `$`. Going through env + `"$VAR"` means bash performs only a single
    # expansion to the literal value; characters inside that value are not
    # re-parsed for `$`/`'`/`"` semantics.
    env:
      DATABASE_PASSWORD: ${{ secrets.database_password }}
      KEYSTORE_SECRET: ${{ secrets.keystore_secret }}
      # CLAMAV_HOST is a secret; route it through env (not inline in
      # `parameters`) for a single bash expansion, same reasoning as
      # DATABASE_PASSWORD above.
      CLAMAV_HOST: ${{ secrets.clamav_host }}
      # Job-level so the step `if:` below can read it (a step's own `env` isn't
      # available to that step's `if`).
      KC_SA_CLIENT_ID: ${{ secrets.keycloak_sa_client_id }}
      # Same reasoning — gates the clamav NetworkPolicy step below.
      OC_NAMESPACE_TOOLS: ${{ secrets.oc_namespace_tools }}
    steps:
      # The deployer action checks out internally, but the Keycloak script runs
      # before it, so check out here to make ./.github/scripts available.
      - uses: actions/checkout@v6

      # Idempotently create the FSP backend's user-lookup service-account client
      # in this environment's realm and assign the nr-user-lookup-api scopes.
      # Skipped when the admin service-account credentials aren't configured
      # (e.g. PR previews), so those deploys are unaffected. The resulting
      # client id/secret are exposed as step outputs (masked) for a later step
      # to feed into the backend once the lookup integration is wired up.
      - name: Ensure Keycloak service account
        id: keycloak_sa
        if: ${{ env.KC_SA_CLIENT_ID != '' }}
        env:
          KEYCLOAK_ISSUER_URI: ${{ secrets.keycloak_issuer_uri }}
          KC_SA_CLIENT_SECRET: ${{ secrets.keycloak_sa_client_secret }}
        run: ./.github/scripts/ensure-keycloak-service-account.sh

      - uses: bcgov/action-deployer-openshift@f7bd61ec357fb1dfd1d43f1287bcd21382d06348 # v4.1.0
        id: deploy
        # The user-lookup client secret is a step OUTPUT (from keycloak_sa), so
        # it can't sit in the job-level env; set it here and reference
        # "$USER_LOOKUP_CLIENT_SECRET" in parameters — single bash expansion,
        # same reasoning as DATABASE_PASSWORD above. Empty when the keycloak_sa
        # step is skipped (PR previews); the backend degrades gracefully.
        env:
          USER_LOOKUP_CLIENT_SECRET: ${{ steps.keycloak_sa.outputs.client_secret }}
          # base-url + issuer are secrets now; route through env (not inline in
          # `parameters`) so bash does a single expansion. Token URL is derived
          # from the issuer; empty when the issuer isn't set (PR previews).
          USER_LOOKUP_BASE_URL: ${{ secrets.user_lookup_base_url }}
          USER_LOOKUP_TOKEN_URL: ${{ secrets.keycloak_issuer_uri != '' && format('{0}/protocol/openid-connect/token', secrets.keycloak_issuer_uri) || '' }}
          # nr-fom API base URL — a secret; route through env (not inline in
          # `parameters`) for a single bash expansion, same as the URLs above.
          # Empty disables the Associated-FOMs enrichment (column stays blank).
          FOM_API_URL: ${{ secrets.fom_api_url }}
        with:
          file: backend/openshift.deploy.yml
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          # debug: true is intentionally OFF. With debug on, the deployer
          # logs the processed Template (including K8s Secret stringData),
          # and GitHub's secret-masking misses values that contain JSON-
          # special characters (<, >, &, etc.) once they get re-encoded.
          # If you need to debug a deploy, enable this temporarily on a
          # commit that uses NON-sensitive placeholder values.
          debug: false
          overwrite: true
          parameters:
            -p ZONE="${{ inputs.target }}"
            -p NAME="nr-fspts"
            -p IMAGE_TAG="${{ inputs.tag }}"
            -p MIN_REPLICAS="${{ inputs.backend_replicas }}"
            -p MAX_REPLICAS="${{ inputs.backend_replicas }}"
            -p AWS_COGNITO_ISSUER_URI="${{ vars.AWS_COGNITO_ISSUER_URI }}"
            -p COGNITO_USERINFO_URI="${{ vars.COGNITO_USERINFO_URI }}"
            -p USER_LOOKUP_BASE_URL="$USER_LOOKUP_BASE_URL"
            -p USER_LOOKUP_TOKEN_URL="$USER_LOOKUP_TOKEN_URL"
            -p USER_LOOKUP_CLIENT_ID="${{ steps.keycloak_sa.outputs.client_id }}"
            -p USER_LOOKUP_CLIENT_SECRET="$USER_LOOKUP_CLIENT_SECRET"
            -p FOM_API_URL="$FOM_API_URL"
            -p CLAMAV_ENABLED="${{ vars.CLAMAV_ENABLED || 'true' }}"
            -p CLAMAV_HOST="$CLAMAV_HOST"
            -p CLAMAV_PORT="${{ vars.CLAMAV_PORT || '3310' }}"
            -p CLAMAV_FAIL_OPEN="${{ vars.CLAMAV_FAIL_OPEN || 'false' }}"
            -p DATABASE_HOST="${{ secrets.database_host }}"
            -p DATABASE_SERVICE_NAME="${{ secrets.database_service_name }}"
            -p DATABASE_USER="${{ secrets.database_user }}"
            -p DATABASE_PASSWORD="$DATABASE_PASSWORD"
            -p KEYSTORE_SECRET="$KEYSTORE_SECRET"
          triggers: ${{ inputs.triggers }}

      # Allow this environment's backend to reach the shared clamav clamd,
      # which lives in a DIFFERENT namespace (tools). The rule is an ingress
      # policy on the clamav pod, so it's applied INTO tools using a
      # tools-scoped token — not this app namespace. Skipped when the tools
      # secrets aren't configured, so deploys without clamav are unaffected.
      - name: Allow backend → clamav (NetworkPolicy in tools)
        if: ${{ env.OC_NAMESPACE_TOOLS != '' }}
        uses: bcgov/action-deployer-openshift@f7bd61ec357fb1dfd1d43f1287bcd21382d06348 # v4.1.0
        with:
          file: backend/openshift.clamav-netpol.yml
          oc_namespace: ${{ secrets.oc_namespace_tools }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token_tools }}
          overwrite: true
          parameters:
            -p TOOLS_NAMESPACE="${{ secrets.oc_namespace_tools }}"
            -p SOURCE_NAMESPACE="${{ secrets.oc_namespace }}"
            -p CLAMAV_POD_LABEL_KEY="${{ vars.CLAMAV_POD_LABEL_KEY || 'app.kubernetes.io/name' }}"
            -p CLAMAV_POD_APP="${{ vars.CLAMAV_POD_APP || 'clamav' }}"
            -p CLAMAV_PORT="${{ vars.CLAMAV_PORT || '3310' }}"

  frontend:
    name: Deploy (frontend)
    environment: ${{ inputs.environment }}
    needs: [backend]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    steps:
      - uses: bcgov/action-deployer-openshift@f7bd61ec357fb1dfd1d43f1287bcd21382d06348 # v4.1.0
        id: deploy
        with:
          file: frontend/openshift.deploy.yml
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          # debug: true is intentionally OFF. With debug on, the deployer
          # logs the processed Template (including K8s Secret stringData),
          # and GitHub's secret-masking misses values that contain JSON-
          # special characters (<, >, &, etc.) once they get re-encoded.
          # If you need to debug a deploy, enable this temporarily on a
          # commit that uses NON-sensitive placeholder values.
          debug: false
          overwrite: true
          parameters:
            -p ZONE="${{ inputs.target }}"
            -p SLOT="${{ inputs.slot || inputs.target }}"
            -p NAME="nr-fspts"
            -p IMAGE_TAG="${{ inputs.tag }}"
            -p REPLICAS="${{ inputs.frontend_replicas }}"
            -p VITE_USER_POOLS_ID="${{ vars.VITE_USER_POOLS_ID }}"
            -p VITE_USER_POOLS_WEB_CLIENT_ID="${{ vars.VITE_USER_POOLS_WEB_CLIENT_ID }}"
            -p VITE_REDIRECT_SIGN_OUT="${{ vars.VITE_REDIRECT_SIGN_OUT }}"
            -p VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL || '/api' }}"
            -p VITE_APP_NAME="${{ vars.VITE_APP_NAME }}"
            -p VITE_ZONE="${{ vars.VITE_ZONE }}"
            -p VITE_MAP_VIEWER_URL="${{ vars.VITE_MAP_VIEWER_URL }}"
          triggers: ${{ inputs.triggers }}
