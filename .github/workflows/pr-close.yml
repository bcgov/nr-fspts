name: PR Closed

on:
  pull_request:
    types: [closed]

concurrency:
  # PR open and close use the same group, allowing only one at a time
  group: ${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup:
    name: Cleanup and Image Promotion
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-close.yml@ca6579bdadf383a2513397081f963889b92823a4 # v1.1.0
    permissions:
      packages: write
    secrets:
      oc_namespace: ${{ secrets.oc_namespace }}
      oc_token: ${{ secrets.oc_token }}
    with:
      cleanup: label
      packages: backend frontend
      # The helper's default cleanup label is `app=<repo-name>-<target>`
      # (i.e. `app=nr-fspts-<PR#>`), but every object in our templates is
      # labelled `app=nr-fspts-{backend,frontend}-<PR#>` — those labels are
      # also the matchLabels/selector for the Deployment, Service, and
      # NetworkPolicy podSelector, so they can't be flattened to a single
      # PR-wide value without colliding backend and frontend Pods.
      # `cleanup_name` is the helper's escape hatch: a space-separated list
      # of label values it iterates over, calling
      #   oc delete all,cm,pvc,secret -l app=<value>
      # for each. Listing both sub-app labels here makes PR close actually
      # remove the deployed objects.
      #
      # NetworkPolicies are NOT covered by `oc delete all` — the
      # cleanup-networkpolicies job below handles them explicitly.
      cleanup_name: nr-fspts-backend-${{ github.event.number }} nr-fspts-frontend-${{ github.event.number }}

  # `oc delete all` (used by the helper above) expands to pods, services,
  # routes, deployments, replicasets, configmaps, etc. — but NOT
  # networkpolicy. Both openshift.deploy.yml templates create per-PR
  # NetworkPolicies (frontend ingress + backend ingress-from-frontend), so
  # without this step they accumulate forever in the namespace. Match by
  # the same `app=` label values the helper uses.
  cleanup-networkpolicies:
    name: Cleanup PR NetworkPolicies
    needs: cleanup
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Delete per-PR NetworkPolicies
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_token: ${{ secrets.oc_token }}
          oc_server: ${{ vars.oc_server }}
          commands: |
            set -eu
            for label in \
              "nr-fspts-backend-${{ github.event.number }}" \
              "nr-fspts-frontend-${{ github.event.number }}"
            do
              echo "Deleting networkpolicies matching app=${label}"
              oc delete networkpolicy -l "app=${label}" --ignore-not-found
            done
