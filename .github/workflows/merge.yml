name: Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/graphics/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  init:
    name: Initialize
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    runs-on: ubuntu-24.04
    steps:
      # Find the PR number associated with this squash-merged commit on main,
      # so we can deploy the same image tag that the PR was running.
      - id: pr
        uses: bcgov/action-get-pr@3931962bf13b3f4702d0013ec7c836f752ff1a3b # v0.3.0

  deploy-test:
    name: TEST Deploys (${{ needs.init.outputs.pr }})
    needs: [init]
    # contents:read here so the nested reusable-deploy jobs can checkout.
    # Workflow-level `permissions: {}` above sets all scopes to none; the
    # called workflow can't grant itself more than the caller has.
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-deploy.yml
    secrets:
      oc_namespace: ${{ secrets.oc_namespace }}
      oc_token: ${{ secrets.oc_token }}
      database_user: ${{ secrets.database_user }}
      database_password: ${{ secrets.database_password }}
      database_host: ${{ secrets.database_host }}
      database_service_name: ${{ secrets.database_service_name }}
      keystore_secret: ${{ secrets.keystore_secret }}
      keycloak_sa_client_id: ${{ secrets.KEYCLOAK_SA_CLIENT_ID }}
      keycloak_sa_client_secret: ${{ secrets.KEYCLOAK_SA_CLIENT_SECRET }}
      keycloak_issuer_uri: ${{ secrets.KEYCLOAK_ISSUER_URI }}
      user_lookup_base_url: ${{ secrets.USER_LOOKUP_BASE_URL }}
    with:
      environment: test
      target: test
      tag: ${{ needs.init.outputs.pr }}
      backend_replicas: "2"
      frontend_replicas: "2"

  tests:
    name: Tests
    needs: [deploy-test]
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-tests.yml
    secrets:
      e2e_idir_user: ${{ secrets.E2E_IDIR_USER }}
      e2e_idir_password: ${{ secrets.E2E_IDIR_PASSWORD }}
    with:
      target: test

